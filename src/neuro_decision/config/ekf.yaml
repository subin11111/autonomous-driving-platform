ekf_filter_node:
  ros__parameters:
    use_sim_time: true      # 시뮬레이터 시간 사용
    frequency: 30.0          # 1초에 30번 퓨전 계산
    two_d_mode: true         # 자율주행차니까 하늘(Z축)은 무시하고 2D 평면만 계산!
    publish_tf: true         # RViz에서 볼 수 있게 좌표계(TF) 쏴주기
    odom_frame: odom
    base_link_frame: ego_vehicle  # CARLA 테슬라의 기본 이름

    # 📡 1번 센서: IMU (회전 방향과 가속도를 담당)
    imu0: /carla/ego_vehicle/imu
    # 어떤 데이터를 믿을지 True/False로 선택합니다. [위치, 회전, 속도, 각속도, 가속도]
    imu0_config: [false, false, false,
                  false, false, true,  # yaw (현재 바라보는 방향)
                  false, false, false,
                  false, false, true,  # yaw 각속도 (얼마나 빨리 도는지)
                  true,  true,  false] # x, y 가속도
    imu0_relative: true

    # 🛰️ 2번 센서: 위치 데이터 (GPS 변환 오도메트리)
    # (참고: CARLA는 이미 완벽한 위치 토픽을 주므로 임시로 이것을 GPS 대신 퓨전합니다)
    odom0: /carla/ego_vehicle/odometry
    odom0_config: [true,  true,  false, # x, y (현재 위치 좌표)
                   false, false, false,
                   false, false, false,
                   false, false, false,
                   false, false, false]